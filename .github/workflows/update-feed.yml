name: Auto update Regulatory Intelligence

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install dependency
        run: pip install feedparser

      - name: Generate unified intelligence feed
        run: |
          python <<EOF
          import feedparser
          from datetime import datetime

          feeds = {
              "FCA (UK)": "https://www.fca.org.uk/news/rss.xml",
              "Bank of England (UK)": "https://www.bankofengland.co.uk/news/rss",
              "Reuters Business": "https://feeds.reuters.com/reuters/businessNews",
              "AP News Business": "https://feeds.apnews.com/rss/apf-business"
          }

          all_entries = []

          for source, url in feeds.items():
              feed = feedparser.parse(url)

              for entry in feed.entries[:7]:
                  published = entry.get("published_parsed")
                  if published:
                      date = datetime(*published[:6])
                  else:
                      date = datetime.utcnow()

                  all_entries.append({
                      "source": source,
                      "title": entry.title,
                      "link": entry.link,
                      "date": date
                  })

          # Sort newest first
          all_entries.sort(key=lambda x: x["date"], reverse=True)

          html = """
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Live Regulatory Intelligence</title>
          <style>
          body { font-family: Arial; background:#ffffff; padding:30px; }
          h1 { margin-bottom:5px; }
          .updated { color:#666; font-size:14px; margin-bottom:25px; }
          ul { list-style:none; padding-left:0; }
          li { margin:14px 0; }
          .source { font-size:12px; color:#777; margin-top:3px; }
          a { text-decoration:none; color:#003366; font-weight:500; }
          a:hover { text-decoration:underline; }
          </style>
          </head>
          <body>
          <h1>Live Regulatory Intelligence</h1>
          <div class="updated">Last updated: """ + datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC") + """</div>
          <ul>
          """

          for item in all_entries[:30]:
              html += f"<li><a href='{item['link']}' target='_blank'>{item['title']}</a>"
              html += f"<div class='source'>{item['source']} | {item['date'].strftime('%Y-%m-%d')}</div></li>"

          html += "</ul></body></html>"

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit and push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Auto update regulatory intelligence feed" || echo "No changes"
          git push
