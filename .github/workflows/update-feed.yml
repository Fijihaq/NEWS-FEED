name: Auto update Regulatory Feed

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Generate HTML
        run: |
          python <<EOF
          import feedparser
          from datetime import datetime

          feeds = {
              "FCA (UK)": "https://www.fca.org.uk/news/rss.xml",
              "PRA (UK)": "https://www.bankofengland.co.uk/rss/prudential-regulation",
              "OCC (US)": "https://www.occ.gov/rss/newsroom.xml",
              "FATF (Global)": "https://www.fatf-gafi.org/en/publications/rss.xml",
              "OFAC (US Treasury)": "https://home.treasury.gov/system/files/126/ofac.xml",
              "FinCEN (US)": "https://www.fincen.gov/news-room/rss.xml",
              "Reuters Business": "https://feeds.reuters.com/reuters/businessNews",
              "AP News Business": "https://feeds.apnews.com/rss/apf-business"
          }

          html = """
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Regulatory News Feed</title>
          <style>
          body { font-family: Arial; background:#ffffff; padding:20px; }
          h2 { margin-top:40px; border-bottom:1px solid #ddd; padding-bottom:5px; }
          ul { list-style:none; padding-left:0; }
          li { margin:8px 0; }
          a { text-decoration:none; color:#003366; }
          a:hover { text-decoration:underline; }
          </style>
          </head>
          <body>
          <h1>Live Regulatory Updates</h1>
          <p>Last updated: """ + datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC") + """</p>
          """

          for name, url in feeds.items():
              feed = feedparser.parse(url)
              html += f"<h2>{name}</h2><ul>"

              if feed.entries:
                  for entry in feed.entries[:5]:
                      title = entry.title
                      link = entry.link
                      html += f"<li><a href='{link}' target='_blank'>{title}</a></li>"
              else:
                  html += "<li>No recent updates available.</li>"

              html += "</ul>"

          html += "</body></html>"

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit and push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Auto update regulatory feed" || echo "No changes to commit"
          git push
